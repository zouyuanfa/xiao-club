name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Build frontend
        working-directory: src
        run: |
          npm ci
          npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build backend
        working-directory: backend
        run: mvn --batch-mode clean package -DskipTests

      - name: Create release archive
        run: |
          mkdir -p release/frontend release/backend
          cp -R src/dist/. release/frontend/
          cp backend/target/tang-club-backend-1.0.0.jar release/backend/xiao-club.jar
          tar -czf xiao-club-release.tar.gz -C release .

      - name: Configure SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SERVER_PORT:-22}" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          scp -P "${SERVER_PORT:-22}" \
            xiao-club-release.tar.gz \
            "$SERVER_USER@$SERVER_HOST:/tmp/xiao-club-release.tar.gz"

      - name: Deploy release
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -p "${SERVER_PORT:-22}" "$SERVER_USER@$SERVER_HOST" \
            "if [ \"\$(id -u)\" -eq 0 ]; then /opt/xiao-club/deploy.sh /tmp/xiao-club-release.tar.gz; else sudo -n /opt/xiao-club/deploy.sh /tmp/xiao-club-release.tar.gz; fi"
